name: AI Review & Fix

on:
  pull_request:
    types: [opened, reopened]

concurrency:
  group: ai-pr-fix-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # ─── Critic: read-only review ───────────────────────────────────────
  critic-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build critic prompt
        id: prompt
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          PROMPT=$(cat .github/agents/critic.md)
          PROMPT="${PROMPT//\{\{PR_NUMBER\}\}/${PR_NUMBER}}"
          PROMPT="${PROMPT//\{\{BASE_REF\}\}/${BASE_REF}}"
          {
            echo "value<<__CRITIC_PROMPT_EOF__"
            echo "$PROMPT"
            echo "__CRITIC_PROMPT_EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Run critic
        id: critic
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: ${{ steps.prompt.outputs.value }}
          allowed_bots: 'claude'
          claude_args: '--model claude-sonnet-4-6 --allowedTools "Read,Glob,Grep,Bash(gh pr diff:*),Bash(gh pr view:*)"'

      - name: Validate critic JSON
        env:
          CRITIC_OUTPUT: ${{ steps.critic.outputs.result }}
        run: |
          python3 << 'PYEOF'
          import json, re, sys, os

          raw = os.environ.get("CRITIC_OUTPUT", "")
          fallback = {
              "summary": "Failed to parse critic output",
              "findings": [],
              "stats": {"total": 0, "errors": 0, "warnings": 0, "info": 0}
          }

          # Try direct JSON parse
          try:
              d = json.loads(raw)
              if "findings" in d:
                  json.dump(d, open("findings.json", "w"), indent=2)
                  sys.exit(0)
          except (json.JSONDecodeError, TypeError):
              pass

          # Try extracting from markdown code blocks
          for match in re.finditer(r'```(?:json)?\s*\n([\s\S]*?)\n```', raw):
              try:
                  d = json.loads(match.group(1))
                  if "findings" in d:
                      json.dump(d, open("findings.json", "w"), indent=2)
                      sys.exit(0)
              except json.JSONDecodeError:
                  continue

          # Fallback: empty findings
          print("WARNING: Could not extract valid JSON from critic output", file=sys.stderr)
          json.dump(fallback, open("findings.json", "w"), indent=2)
          PYEOF

          echo "::group::Findings JSON"
          jq '.' findings.json
          echo "::endgroup::"

      - uses: actions/upload-artifact@v4
        with:
          name: findings
          path: findings.json

  # ─── Fixer: verify findings & apply fixes ───────────────────────────
  fixer:
    needs: critic-review
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    outputs:
      verdict: ${{ steps.save.outputs.verdict }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: findings

      - name: Check for findings
        id: check
        run: |
          COUNT=$(jq '.findings | length' findings.json)
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "Found $COUNT critic findings"

      - name: Load fixer prompt
        id: prompt
        if: steps.check.outputs.count != '0'
        run: |
          {
            echo "value<<__FIXER_PROMPT_EOF__"
            cat .github/agents/fixer.md
            echo "__FIXER_PROMPT_EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Run fixer
        id: fixer
        if: steps.check.outputs.count != '0'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: ${{ steps.prompt.outputs.value }}
          allowed_bots: 'claude'
          claude_args: '--model claude-sonnet-4-6 --allowedTools "Read,Write,Edit,Glob,Grep,Bash(git:*)"'

      - name: Save verdict
        id: save
        env:
          FIXER_OUTPUT: ${{ steps.fixer.outputs.result }}
          FINDING_COUNT: ${{ steps.check.outputs.count }}
        run: |
          if [ "$FINDING_COUNT" = "0" ]; then
            VERDICT="No findings to fix — critic found no issues."
          else
            VERDICT="${FIXER_OUTPUT:-Fixer produced no output.}"
          fi
          {
            echo "verdict<<__VERDICT_EOF__"
            echo "$VERDICT"
            echo "__VERDICT_EOF__"
          } >> "$GITHUB_OUTPUT"

  # ─── Post summary: idempotent PR comment ────────────────────────────
  post-summary:
    needs: [critic-review, fixer]
    if: always() && needs.critic-review.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: findings

      - name: Post review summary
        uses: actions/github-script@v7
        env:
          VERDICT: ${{ needs.fixer.outputs.verdict }}
        with:
          script: |
            const fs = require('fs');
            const findings = JSON.parse(fs.readFileSync('findings.json', 'utf8'));
            const verdict = process.env.VERDICT || '_Fixer did not run._';
            const marker = '<!-- ai-review-summary -->';

            // Build findings section
            let findingsSection = '';
            if (findings.findings.length === 0) {
              findingsSection = '_No issues found._';
            } else {
              findingsSection = `**Summary**: ${findings.summary}\n\n`;
              findingsSection += '| ID | File | Severity | Category | Description |\n';
              findingsSection += '|----|------|----------|----------|-------------|\n';
              for (const f of findings.findings) {
                const desc = f.description.replace(/\|/g, '\\|').replace(/\n/g, ' ');
                findingsSection += `| ${f.id} | \`${f.file}:${f.line_start}\` | ${f.severity} | ${f.category} | ${desc} |\n`;
              }
              const s = findings.stats;
              findingsSection += `\n**Stats**: ${s.errors || 0} errors, ${s.warnings || 0} warnings, ${s.info || 0} info`;
            }

            const body = [
              marker,
              '## AI Review Summary',
              '',
              '### Critic Findings',
              findingsSection,
              '',
              '### Fixer Verdict',
              verdict,
              '',
              '---',
              '_Dual-agent review: Critic analyzed → Fixer verified and applied fixes._'
            ].join('\n');

            // Idempotent: find existing bot comment with marker, update or create
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100
            });

            const existing = comments.find(c => c.body && c.body.startsWith(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
              core.info(`Updated existing comment ${existing.id}`);
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
              core.info('Created new summary comment');
            }
